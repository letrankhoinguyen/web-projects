<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Blog Post Card</title>
  </head>
  <body>
    <div class="blog-post-card">
      <img
        class="post-img"
        src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
        alt="post-img"
      />
      <div class="post-content">
        <h2 class="post-title">Learn Web Development in 2026</h2>
        <p class="post-excerpt">
          Stay ahead of the curve with the latest <br />trends in web
          development. Discover <br />what's new and exciting in 2024
        </p>
        <a href="https://example.com" class="read-more">Read More</a>
      </div>
    </div>
  </body>
</html>
